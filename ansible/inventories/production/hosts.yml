---
all:
  children:
    apps_runners:
      hosts:
        apps-runner-ryzen:
          ansible_host: apps-runner-ryzen
          ansible_user: docker-admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_homelab
          apps:
            - hello
        home-automation-ryzen:
          ansible_host: home-automation-ryzen
          ansible_user: docker-admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_homelab
          apps:
            - home-assistant
            - mosquitto
        apps-runner-nuc:
          ansible_host: apps-runner-nuc
          ansible_user: docker-admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_homelab
          apps:
            - hello
            - agentdvr
        home-automation-nuc:
          ansible_host: home-automation-nuc
          ansible_user: docker-admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_homelab
          apps:
            - home-assistant
            - mosquitto


---
- name: Définir le répertoire de l'application
  ansible.builtin.set_fact:
    app_dir: "{{ env_json.docker_admin.apps_home | realpath }}/{{ app_name }}"

- name: Créer le répertoire parent de l'application
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: docker-admin
    group: docker
    mode: "2775"
  tags: always  # SetGID + rwxrwxr-x

- name: Créer les sous-répertoires de volumes
  ansible.builtin.file:
    path: "{{ app_dir }}/{{ item.host_path }}"
    state: directory
    owner: "{{ env_json.apps[app_name].vol_owner | default('docker-admin') }}"
    group: "{{ env_json.apps[app_name].vol_group | default('docker') }}"
    mode: "2775"
  loop: "{{ env_json.apps[app_name].volumes | default([]) }}"
  loop_control:
    loop_var: item
  become: true

- name: Activer le démarrage automatique de Docker au boot du LXC
  ansible.builtin.systemd:
    name: docker.service
    enabled: true
    state: started
  become: true

- name: Déployer la configuration DNS du daemon Docker
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  register: daemon_config
  become: true

- name: Redémarrer Docker si la configuration DNS a changé
  ansible.builtin.systemd:
    name: docker.service
    state: restarted
  when: daemon_config is changed
  become: true

- name: Attendre que Docker soit opérationnel après redémarrage
  ansible.builtin.command: docker info
  register: docker_ready
  changed_when: false
  failed_when: false
  until: docker_ready.rc == 0
  retries: 10
  delay: 3
  when: daemon_config is changed
  become: true

- name: Déployer le docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: docker-admin
    group: docker
    mode: "0644"
  register: deploy_template

- name: Valider la syntaxe du docker-compose.yml
  ansible.builtin.command: docker compose config
  args:
    chdir: "{{ app_dir }}"
  register: compose_config
  changed_when: false

- name: Récupérer les images Docker
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ app_dir }}"
  register: compose_pull
  changed_when:
    - "'Pulled' in compose_pull.stdout or 'Downloaded' in compose_pull.stdout"

- name: Forcer le redéploiement (suppression du conteneur existant)
  ansible.builtin.command: docker compose down
  args:
    chdir: "{{ app_dir }}"
  register: docker_compose_down
  failed_when: false
  changed_when: >-
    'Removing' in docker_compose_down.stderr
    or 'Removing' in docker_compose_down.stdout
  when: deploy_template is changed or compose_pull is changed

- name: Démarrer l'application
  ansible.builtin.command: docker compose up -d --remove-orphans
  args:
    chdir: "{{ app_dir }}"
  register: docker_compose_up
  changed_when: >-
    'Creating' in docker_compose_up.stderr
    or 'Recreating' in docker_compose_up.stderr
    or 'Starting' in docker_compose_up.stderr
  when: deploy_template is changed or compose_pull is changed

- name: Attendre que le conteneur soit opérationnel
  ansible.builtin.command: docker compose ps --format json
  args:
    chdir: "{{ app_dir }}"
  register: compose_health
  changed_when: false
  failed_when: false
  until: >-
    compose_health.stdout | length > 2
    and 'running' in compose_health.stdout
  retries: 10
  delay: 3

- name: Générer le README.md de l'application
  ansible.builtin.template:
    src: app_readme.j2
    dest: "{{ app_dir }}/README.md"
    owner: docker-admin
    group: docker
    mode: "0644"

- name: Générer le README.md global pour les applications
  ansible.builtin.template:
    src: apps_readme.j2
    dest: "{{ env_json.docker_admin.apps_home | realpath }}/README.md"
    owner: docker-admin
    group: docker
    mode: "0644"
